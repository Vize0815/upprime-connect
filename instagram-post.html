<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:1080px;height:1080px;overflow:hidden;background:#05050A;font-family:'DM Sans',sans-serif;position:relative}
  .blob{position:absolute;border-radius:50%;filter:blur(140px);pointer-events:none}
  .b1{width:700px;height:700px;background:#9333EA;opacity:.22;top:-200px;left:-150px}
  .b2{width:560px;height:560px;background:#4F8EF7;opacity:.14;bottom:-180px;right:-120px}
  .b3{width:400px;height:400px;background:#C084FC;opacity:.10;top:200px;right:50px}
  .shape{position:absolute;border-radius:9999px;border:2px solid rgba(255,255,255,.1)}
  .s1{width:700px;height:160px;background:linear-gradient(to right,rgba(99,102,241,.16),transparent);top:-30px;left:-80px;transform:rotate(10deg)}
  .s2{width:560px;height:130px;background:linear-gradient(to right,rgba(244,63,94,.13),transparent);bottom:-20px;right:-60px;transform:rotate(-12deg)}
  .s3{width:320px;height:80px;background:linear-gradient(to right,rgba(167,139,250,.14),transparent);bottom:160px;left:60px;transform:rotate(-5deg)}
  .s4{width:180px;height:50px;background:linear-gradient(to right,rgba(251,191,36,.11),transparent);top:120px;right:120px;transform:rotate(16deg)}
  .grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:48px 48px}
  .content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:72px}

  /* Top */
  .top{display:flex;align-items:center;justify-content:space-between}
  .logo-row{display:flex;align-items:center;gap:14px}
  .logo-mark{width:52px;height:52px;background:linear-gradient(135deg,#9333EA,#C084FC);border-radius:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(147,51,234,.5)}
  .logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:#F0F0FF;letter-spacing:-.02em}
  .logo-name span{color:#C084FC}
  .tag{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:9999px;background:rgba(147,51,234,.1);border:1px solid rgba(147,51,234,.3);font-family:'Syne',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#C084FC}
  .tag-dot{width:6px;height:6px;border-radius:50%;background:#C084FC;box-shadow:0 0 6px rgba(192,132,252,.8)}

  /* Center */
  .center{display:flex;flex-direction:column;gap:28px}
  .eyebrow{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35)}
  h1{font-family:'Syne',sans-serif;font-size:4.2rem;font-weight:800;letter-spacing:-.04em;line-height:1.05;color:#F0F0FF}
  h1 .g{background:linear-gradient(to right,#a5b4fc,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{font-size:1.1rem;font-weight:300;color:rgba(255,255,255,.4);line-height:1.7;max-width:560px}

  /* Bottom */
  .bottom{display:flex;align-items:flex-end;justify-content:space-between}
  .pills{display:flex;flex-direction:column;gap:10px}
  .pill{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border-radius:9999px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);width:fit-content}
  .pd{width:6px;height:6px;border-radius:50%}
  .pd.p{background:#9333EA;box-shadow:0 0 6px rgba(147,51,234,.8)}
  .pd.b{background:#4F8EF7;box-shadow:0 0 6px rgba(79,142,247,.8)}
  .pd.v{background:#C084FC;box-shadow:0 0 6px rgba(192,132,252,.8)}
  .cta{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .cta-url{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:.04em}
  .cta-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;background:linear-gradient(135deg,#9333EA,#7C22CC);font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:#fff;box-shadow:0 8px 32px rgba(147,51,234,.4)}
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape s3"></div>
  <div class="shape s4"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="top">
      <div class="logo-row">
        <div class="logo-mark">
          <svg width="28" height="28" viewBox="0 0 17 17" fill="none">
            <path d="M8.5 1.5L14 4.8V11.2L8.5 14.5L3 11.2V4.8L8.5 1.5Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M8.5 1.5V8.5M8.5 8.5L14 4.8M8.5 8.5L3 4.8" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo-name">Upprime <span>Connect</span></div>
      </div>
      <div class="tag"><div class="tag-dot"></div>Webdesign Agentur</div>
    </div>

    <div class="center">
      <div class="eyebrow">Deine digitale Präsenz</div>
      <h1>Wir bauen Marken,<br>die <span class="g">bleiben.</span></h1>
      <p class="sub">Von einzigartigen Logos bis zu leistungsstarken Websites — wir bringen Ihr Unternehmen nach oben.</p>
    </div>

    <div class="bottom">
      <div class="pills">
        <div class="pill"><div class="pd p"></div>Logo & Branding</div>
        <div class="pill"><div class="pd b"></div>Website Entwicklung</div>
        <div class="pill"><div class="pd v"></div>SEO & Sichtbarkeit</div>
      </div>
      <div class="cta">
        <div class="cta-url">upprime-connect.at</div>
        <div class="cta-btn">
          Jetzt anfragen
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
