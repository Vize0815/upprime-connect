<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Upprime Connect — Wartungsmodus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:#05050A;color:#F0F0FF;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;opacity:.18}
        .blob-1{width:600px;height:600px;background:#9333EA;top:-200px;left:-200px}
        .blob-2{width:500px;height:500px;background:#4F8EF7;bottom:-150px;right:-150px}
        @keyframes floatA{0%,100%{transform:translateY(0) rotate(12deg)}50%{transform:translateY(18px) rotate(12deg)}}
        @keyframes floatB{0%,100%{transform:translateY(0) rotate(-15deg)}50%{transform:translateY(14px) rotate(-15deg)}}
        @keyframes floatC{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(20px) rotate(-8deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .shape{position:fixed;border-radius:9999px;border:2px solid rgba(255,255,255,.12);pointer-events:none}
        .shape-1{width:500px;height:120px;background:linear-gradient(to right,rgba(99,102,241,.14),transparent);top:15%;left:-8%;animation:floatA 10s ease-in-out infinite}
        .shape-2{width:380px;height:90px;background:linear-gradient(to right,rgba(244,63,94,.12),transparent);bottom:20%;right:-4%;animation:floatB 13s ease-in-out infinite}
        .shape-3{width:220px;height:60px;background:linear-gradient(to right,rgba(167,139,250,.12),transparent);bottom:10%;left:6%;animation:floatC 11s ease-in-out infinite}
        .card{position:relative;z-index:10;text-align:center;padding:64px 48px;max-width:560px;width:calc(100% - 48px);background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
        .logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:40px;animation:fadeIn .8s .1s both}
        .logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#9333EA,#C084FC);border-radius:10px;display:flex;align-items:center;justify-content:center}
        .logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:#F0F0FF;letter-spacing:-.01em}
        .logo-name span{color:#C084FC}
        .spinner-wrap{display:flex;justify-content:center;margin-bottom:32px;animation:fadeIn .8s .2s both}
        .spinner{width:52px;height:52px;border-radius:50%;border:2px solid rgba(147,51,234,.15);border-top-color:#9333EA;animation:spin 1.2s linear infinite}
        .badge{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:9999px;background:rgba(147,51,234,.1);border:1px solid rgba(147,51,234,.25);margin-bottom:24px;animation:fadeIn .8s .3s both}
        .badge-dot{width:6px;height:6px;border-radius:50%;background:#C084FC;animation:pulse 2s ease-in-out infinite}
        .badge span{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#C084FC}
        h1{font-family:'Syne',sans-serif;font-size:clamp(1.9rem,5vw,2.8rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:16px;animation:fadeIn .8s .4s both}
        h1 span{background:linear-gradient(to right,#a5b4fc,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        p.sub{color:rgba(255,255,255,.45);font-size:.97rem;line-height:1.75;margin-bottom:36px;animation:fadeIn .8s .5s both}
        .email-btn{display:inline-flex;align-items:center;gap:9px;padding:13px 24px;border-radius:12px;background:rgba(147,51,234,.12);border:1px solid rgba(147,51,234,.3);color:#C084FC;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;text-decoration:none;transition:background .2s,border-color .2s,color .2s;animation:fadeIn .8s .6s both}
        .email-btn:hover{background:rgba(147,51,234,.22);border-color:rgba(147,51,234,.55);color:#fff}
        .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:36px 0;animation:fadeIn .8s .7s both}
        .note{font-size:.8rem;color:rgba(255,255,255,.22);animation:fadeIn .8s .8s both}
        .portrait-wrap{display:flex;justify-content:center;margin-bottom:20px;animation:fadeIn .8s .55s both}
        .portrait{width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid rgba(147,51,234,.4);box-shadow:0 0 0 4px rgba(147,51,234,.1)}
        .social-wrap{display:flex;justify-content:center;margin-top:16px;animation:fadeIn .8s .9s both}
        .fb-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:rgba(24,119,242,.08);border:1px solid rgba(24,119,242,.25);color:rgba(106,171,255,.7);text-decoration:none;transition:background .2s,border-color .2s,color .2s}
        .fb-btn:hover{background:rgba(24,119,242,.18);border-color:rgba(24,119,242,.5);color:#fff}
        @media(max-width:480px){.card{padding:48px 28px}}
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="card">
        <div class="logo">
            <div class="logo-mark">
                <svg width="20" height="20" viewBox="0 0 17 17" fill="none">
                    <path d="M8.5 1.5L14 4.8V11.2L8.5 14.5L3 11.2V4.8L8.5 1.5Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
                    <path d="M8.5 1.5V8.5M8.5 8.5L14 4.8M8.5 8.5L3 4.8" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="logo-name">Upprime <span>Connect</span></span>
        </div>
        <div class="spinner-wrap"><div class="spinner"></div></div>
        <div class="badge"><div class="badge-dot"></div><span>Wartungsmodus</span></div>
        <h1>Wir sind bald<br><span>wieder da.</span></h1>
        <p class="sub">Unsere Website wird gerade aktualisiert und verbessert.<br>Wir sind in Kürze wieder für Sie erreichbar.</p>
        <div class="portrait-wrap">
            <img src="alexander-kroes.png" alt="Alexander Kroes" class="portrait">
        </div>
        <a href="mailto:support@upprime-connect.at" class="email-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M2 6.5L9 11L16 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            support@upprime-connect.at
        </a>
        <div class="divider"></div>
        <p class="note">©2026 Upprime Connect — Webdesign · SEO · Branding</p>
        <div class="social-wrap">
            <a href="https://facebook.com/upprimeconnect" target="_blank" rel="noopener" class="fb-btn" aria-label="Upprime Connect auf Facebook">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
            </a>
        </div>
    </div>
</body>
</html>
