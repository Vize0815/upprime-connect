<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upprime Connect — Facebook Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
        }

        /* ── Facebook cover: 820 × 312 px ── */
        .cover {
            width: 820px;
            height: 312px;
            background: #05050A;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Ambient blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
        }
        .blob-1 { width: 420px; height: 420px; background: #9333EA; opacity: .22; top: -160px; left: -100px; }
        .blob-2 { width: 360px; height: 360px; background: #4F8EF7; opacity: .14; bottom: -140px; right: -80px; }
        .blob-3 { width: 260px; height: 260px; background: #C084FC; opacity: .10; top: -80px; right: 160px; }

        /* Floating pill shapes */
        .shape {
            position: absolute;
            border-radius: 9999px;
            border: 1.5px solid rgba(255,255,255,.12);
        }
        .s1 { width: 460px; height: 90px;  background: linear-gradient(to right, rgba(99,102,241,.18), transparent); top: -20px;  left: -60px;  transform: rotate(12deg); }
        .s2 { width: 340px; height: 70px;  background: linear-gradient(to right, rgba(244,63,94,.13), transparent);  bottom: -18px; right: -40px; transform: rotate(-14deg); }
        .s3 { width: 200px; height: 50px;  background: linear-gradient(to right, rgba(167,139,250,.14), transparent); bottom: 30px;  left: 40px;   transform: rotate(-6deg); }
        .s4 { width: 130px; height: 36px;  background: linear-gradient(to right, rgba(251,191,36,.11), transparent);  top: 30px;    right: 80px;  transform: rotate(18deg); }
        .s5 { width: 90px;  height: 26px;  background: linear-gradient(to right, rgba(34,211,238,.11), transparent);  top: 70px;    left: 200px;  transform: rotate(-22deg); }

        /* Subtle dot grid */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        /* Content */
        .content {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
        }

        /* Left: logo + name + tagline */
        .left { display: flex; flex-direction: column; gap: 14px; }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-mark {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #9333EA, #C084FC);
            border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 24px rgba(147,51,234,.45);
            flex-shrink: 0;
        }
        .logo-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: #F0F0FF;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .logo-name span { color: #C084FC; }

        .tagline {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 300;
            color: rgba(255,255,255,.45);
            letter-spacing: 0.01em;
            padding-left: 2px;
        }

        /* Divider */
        .vdivider {
            width: 1px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,.1), transparent);
        }

        /* Right: services pills */
        .right {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 16px;
            border-radius: 9999px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.08);
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,.5);
            white-space: nowrap;
        }
        .pill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .pill-dot.p { background: #9333EA; box-shadow: 0 0 6px rgba(147,51,234,.8); }
        .pill-dot.b { background: #4F8EF7; box-shadow: 0 0 6px rgba(79,142,247,.8); }
        .pill-dot.s { background: #C084FC; box-shadow: 0 0 6px rgba(192,132,252,.8); }

        /* Bottom fade */
        .fade-b {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(to top, rgba(5,5,10,.5), transparent);
            pointer-events: none;
        }

        /* Print hint */
        .hint {
            margin-top: 18px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,.25);
        }
        @media print { .hint { display: none; } }
    </style>
</head>
<body>

    <div>
        <div class="cover">
            <!-- Blobs -->
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>

            <!-- Shapes -->
            <div class="shape s1"></div>
            <div class="shape s2"></div>
            <div class="shape s3"></div>
            <div class="shape s4"></div>
            <div class="shape s5"></div>

            <!-- Dot grid -->
            <div class="grid"></div>

            <!-- Content -->
            <div class="content">

                <div class="left">
                    <div class="logo-row">
                        <div class="logo-mark">
                            <svg width="24" height="24" viewBox="0 0 17 17" fill="none">
                                <path d="M8.5 1.5L14 4.8V11.2L8.5 14.5L3 11.2V4.8L8.5 1.5Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
                                <path d="M8.5 1.5V8.5M8.5 8.5L14 4.8M8.5 8.5L3 4.8" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="logo-name">Upprime <span>Connect</span></div>
                    </div>
                    <div class="tagline">Webdesign · SEO · Branding — Tirol, Österreich</div>
                </div>

                <div class="vdivider"></div>

                <div class="right">
                    <div class="pill"><span class="pill-dot p"></span>Logo & Visual Identity</div>
                    <div class="pill"><span class="pill-dot b"></span>Website Entwicklung</div>
                    <div class="pill"><span class="pill-dot s"></span>SEO & Sichtbarkeit</div>
                    <div class="pill"><span class="pill-dot p"></span>Branding & Strategie</div>
                </div>

            </div>

            <!-- Bottom fade -->
            <div class="fade-b"></div>
        </div>

        <p class="hint">820 × 312 px — Screenshot machen &amp; als Facebook-Titelbild hochladen</p>
    </div>

</body>
</html>
